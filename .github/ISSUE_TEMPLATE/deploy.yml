name: "🚀 Deploy"
description: 배포 관련 작업
title: "[Deploy] "
labels:
  - deploy
  - release
body:
  - type: markdown
    attributes:
      value: |
        배포, 머지, 브랜치 반영 흐름을 정리하는 이슈입니다.
        예: `dev <- release` 검증, `main <- release` 운영 반영, Vercel 반영, 배포 체크리스트

  - type: dropdown
    id: deploy_type
    attributes:
      label: 배포 작업 유형
      description: 이번 이슈가 다루는 배포 흐름을 선택해주세요.
      options:
        - release -> dev 검증
        - release -> main 운영 반영
        - Vercel 자동 배포 설정
        - 핫픽스 배포
        - 기타 배포 작업
    validations:
      required: true

  - type: input
    id: target_branch
    attributes:
      label: 대상 브랜치
      description: 최종 반영 대상 브랜치를 적어주세요.
      placeholder: "예: dev, release, main"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 무엇을 왜 배포하거나 반영해야 하는지 간단히 적어주세요.
      placeholder: |
        release 브랜치의 검증 완료 내용을 dev에 반영해 QA를 진행합니다.
        또는 release를 main에 반영해 운영 배포를 진행합니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 반영 범위
      description: 포함되는 기능, 커밋, PR, 이슈를 적어주세요.
      placeholder: |
        - 포함 PR: #12, #18
        - 관련 이슈: #21
        - 제외 항목: 실험 기능, 미검증 코드
    validations:
      required: true

  - type: textarea
    id: checks
    attributes:
      label: 사전 확인 사항
      description: 배포 전에 확인해야 할 내용을 적어주세요.
      placeholder: |
        - lint/build 통과
        - 환경변수 반영 여부 확인
        - 데이터 마이그레이션 여부 확인
        - 롤백 포인트 확인
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 이 이슈가 완료되었다고 볼 기준을 적어주세요.
      placeholder: |
        - 대상 브랜치 머지 완료
        - Vercel 배포 성공
        - 주요 화면 정상 동작 확인
    validations:
      required: true

  - type: input
    id: references
    attributes:
      label: 관련 링크
      description: PR, 배포 URL, 이슈 링크를 적어주세요.
      placeholder: "예: PR #34, Vercel deployment URL, Issue #12"

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 대상 브랜치와 머지 방향을 다시 확인했습니다.
        - label: 배포에 포함하면 안 되는 개발 전용 변경을 확인했습니다.
        - label: 롤백 또는 재배포 방법을 확인했습니다.
        - label: 완료 후 관련 PR과 이슈 상태를 정리할 예정입니다.
