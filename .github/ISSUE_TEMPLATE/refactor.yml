name: "♻️ Refactor"
description: 수정 작업
title: "[Refactor] "
labels:
  - refactor
body:
  - type: markdown
    attributes:
      value: |
        구조 개선, 코드 정리, 유지보수성 향상, 중복 제거를 위한 이슈입니다.
        동작 변경이 핵심이 아니라 품질 개선이 핵심일 때 사용합니다.

  - type: input
    id: target
    attributes:
      label: 리팩터링 대상
      description: 어떤 모듈, 흐름, 파일군을 정리할지 적어주세요.
      placeholder: "예: KIS API route와 데이터 매핑 로직"
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 현재 문제
      description: 지금 구조에서 어떤 점이 불편하거나 위험한지 적어주세요.
      placeholder: |
        - 로직이 여러 곳에 중복됩니다.
        - 타입이 불명확합니다.
        - 테스트/배포 시 수정 비용이 큽니다.
    validations:
      required: true

  - type: textarea
    id: refactor_goal
    attributes:
      label: 개선 목표
      description: 이번 리팩터링으로 어떤 상태를 만들고 싶은지 적어주세요.
      placeholder: |
        - 타입 일관성 확보
        - 중복 제거
        - 책임 분리
        - 배포 안정성 향상
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      description: 변경 영향이 있는 영역을 적어주세요.
      placeholder: |
        - API route
        - 공통 유틸
        - 화면 컴포넌트
        - 빌드/배포 설정
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 리팩터링 완료 기준을 적어주세요.
      placeholder: |
        - 기존 동작이 유지됩니다.
        - lint/build가 통과합니다.
        - 구조가 더 단순해집니다.
    validations:
      required: true

  - type: input
    id: references
    attributes:
      label: 관련 이슈 또는 PR
      description: 같이 참고할 이슈나 PR을 적어주세요.
      placeholder: "예: #15, #22"

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 기능 추가가 아니라 구조 개선 중심 작업임을 확인했습니다.
        - label: 영향 범위와 회귀 가능성을 검토했습니다.
        - label: 완료 후 lint/build 또는 핵심 동작 검증이 필요함을 확인했습니다.
